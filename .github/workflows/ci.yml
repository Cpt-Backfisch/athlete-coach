# CI-Workflow für athlete-coach
# Läuft bei jedem Push auf main und bei jedem Pull Request.
# Deploy läuft ausschließlich auf main — und nur nach grünem CI.
#
# HINWEIS lint-Job:
#   index.html ist aktuell von ESLint und Prettier AUSGENOMMEN.
#   Grund: Die Datei ist eine ~3500-Zeilen Legacy-Single-File-App ohne Build-System.
#   Ein Lint/Format-Check würde sofort hunderte Findings produzieren.
#   Echte Abdeckung kommt ab Phase 1 (React-Migration), wenn index.html in
#   modulare Komponenten aufgeteilt und ins Build-System integriert wird.
#   Bis dahin prüft der lint-Job nur neue .js/.css/.md-Dateien.
#
# EINMALIGE SETUP-AKTION (muss Sebastian manuell tun, einmalig):
#   GitHub Repo → Settings → Pages → Source → "GitHub Actions" auswählen.
#   Solange "Deploy from a branch" aktiv ist, deployt GitHub Pages weiterhin
#   direkt aus main — parallel zu diesem Workflow. Nach dem Umstellen läuft
#   der Deploy ausschließlich über diesen Workflow.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # lint: ESLint + Prettier-Check
  #
  # HINWEIS: index.html wird aktuell NICHT geprüft (siehe Kommentar oben).
  # Solange keine .js-Dateien im Repo existieren, prüft ESLint faktisch nichts
  # (--no-error-on-unmatched-pattern verhindert einen Fehler auf leerem Match).
  # Echte Lint-Abdeckung kommt mit Phase 1 und der React-Migration.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier check
        run: npm run format:check

  # ---------------------------------------------------------------------------
  # secret-scan: gitleaks prüft den gesamten Commit-Verlauf auf Secrets.
  # Bricht den Build ab, wenn ein potenzielles Secret gefunden wird.
  # ---------------------------------------------------------------------------
  secret-scan:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # test-unit: Vitest Unit-Tests für pure Utility-Funktionen in src/utils/
  # ---------------------------------------------------------------------------
  test-unit:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Vitest ausführen
        run: npm test

  # ---------------------------------------------------------------------------
  # test-e2e: Playwright Smoke-Tests gegen die live GitHub-Pages-URL.
  # Läuft nach den Unit-Tests, setzt kein lokales Deploy voraus.
  # ---------------------------------------------------------------------------
  test-e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [test-unit]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Playwright-Browser installieren (nur Chromium)
        run: npx playwright install --with-deps chromium

      - name: Playwright Smoke-Tests ausführen
        run: npm run test:e2e

      - name: Test-Report hochladen (bei Fehler)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # deploy-gate: Deployt index.html auf GitHub Pages — aber nur auf main
  # und nur wenn Lint, Secret-Scan, Unit-Tests und E2E-Tests alle grün sind.
  #
  # Setzt BUILD-Timestamp automatisch (ersetzt den bisherigen manuellen Schritt).
  #
  # Voraussetzung (einmalig manuell):
  #   GitHub Repo → Settings → Pages → Source → "GitHub Actions" auswählen.
  # ---------------------------------------------------------------------------
  deploy-gate:
    name: Deploy (GitHub Pages)
    runs-on: ubuntu-latest
    needs: [lint, secret-scan, test-unit, test-e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: BUILD-Timestamp aktualisieren
        run: |
          TIMESTAMP=$(date +%s)
          sed -i "s/const BUILD='[0-9][0-9]*/const BUILD='${TIMESTAMP}/" index.html
          echo "BUILD-Timestamp gesetzt: ${TIMESTAMP}"

      - uses: actions/configure-pages@v4

      - name: Deployment-Artefakt vorbereiten
        run: |
          mkdir -p _site
          cp index.html _site/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Auf GitHub Pages deployen
        id: deployment
        uses: actions/deploy-pages@v4
